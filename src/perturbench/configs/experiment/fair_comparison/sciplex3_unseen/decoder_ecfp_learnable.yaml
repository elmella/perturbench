# @package _global_

defaults:
  - override /model: decoder_only
  - override /data: sciplex3_unseen

seed: 245

trainer:
  min_epochs: 5
  max_epochs: 500

model:
  learnable_embeddings: true
  freeze_embeddings: false
  perturbation_embedding_path: ${paths.work_dir}/fp_lmp_embeddings/tahoe_sci_op3_updated.pkl
  perturbation_embedding_column: "ECFP:2"
  perturbation_embedding_name_column: original_pert_name
  perturbation_embedding_dataset: sciplex3
  encoder_width: 4352
  lr: 6.798204826057849e-05
  n_layers: 5
  softplus_output: true
  wd: 7.601981738045318e-06

