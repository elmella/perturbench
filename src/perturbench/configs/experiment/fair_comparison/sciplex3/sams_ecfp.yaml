# @package _global_

defaults:
  - override /model: sams_vae
  - override /data: sciplex3_ecfp

seed: 137

trainer:
  min_epochs: 5
  max_epochs: 500
  precision: 32

data:
  batch_size: 256
  add_controls: False
  perturbation_subset_path: ${paths.work_dir}/notebooks/neurips2025/perturbench_data/common_perturbations.txt
  evaluation:
    chunk_size: 10

model:
  dropout: 0.30000000000000004
  hidden_dim_cond: 2816
  hidden_dim_x: 1536
  inject_covariates_decoder: false
  inject_covariates_encoder: false
  latent_dim: 64
  lr: 0.00040019008240191795
  mask_prior_probability: 0.011486688007756388
  n_layers_decoder: 1
  n_layers_encoder_e: 2
  n_layers_encoder_x: 4
  softplus_output: true
  wd: 1.749495655302928e-06
