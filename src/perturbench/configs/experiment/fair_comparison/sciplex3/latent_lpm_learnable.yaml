# @package _global_

defaults:
  - override /model: latent_additive
  - override /data: sciplex3

seed: 245

trainer:
  min_epochs: 5
  max_epochs: 500

model:
  dropout: 0.3
  encoder_width: 5376
  inject_covariates_decoder: true
  inject_covariates_encoder: true
  latent_dim: 192
  lr: 3.411309338851789e-05
  n_layers: 2
  softplus_output: true
  wd: 6.078971860813963e-11

  learnable_embeddings: true
  freeze_embeddings: false
  perturbation_embedding_path: ${paths.work_dir}/fp_lmp_embeddings/tahoe_sci_op3_updated.pkl
  perturbation_embedding_column: "LPM_emb"
  perturbation_embedding_name_column: original_pert_name
  perturbation_embedding_dataset: sciplex3
data:
  perturbation_subset_path: ${paths.work_dir}/notebooks/neurips2025/perturbench_data/common_perturbations.txt
