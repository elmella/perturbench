defaults:
  - transform: molecule_embedding_pipeline
  - splitter: unseen_cv_task
  - evaluation: final_test

_target_: perturbench.data.modules.AnnDataLitModule
datapath: ${paths.data_dir}/op3_de_genes.h5ad
perturbation_key: sm_name
perturbation_combination_delimiter: +
perturbation_control_value: Dimethyl Sulfoxide
covariate_keys: [cell_type]
batch_size: 4000
num_workers: 8
batch_sample: True
add_controls: True
use_counts: False
embedding_key: null
# LPM from all_l1000_25_epochs/op3_emb_all_l1000_20.pkl. Override the column
# (e.g. lpm_style_embeddings_l1000) or path (different epoch file) at the CLI.
perturbation_embedding_path: ${oc.env:OP3_LPM_EMB_PATH,${paths.work_dir}/all_l1000_25_epochs/op3_emb_all_l1000_20.pkl}
perturbation_embedding_column: ${oc.env:OP3_LPM_EMB_COLUMN,lpm_style_embeddings_all}
perturbation_embedding_name_column: perturbagen
perturbation_subset_path: ${paths.data_dir}/op3_lpm_available_perturbations.txt
evaluation:
  chunk_size: 50
