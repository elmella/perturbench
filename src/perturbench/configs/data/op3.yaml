defaults:
  - transform: linear_model_pipeline
  - splitter: op3_saved_split
  - evaluation: default

_target_: perturbench.data.modules.AnnDataLitModule
datapath: ${paths.data_dir}/op3_processed.h5ad
perturbation_key: sm_name
perturbation_combination_delimiter: +
perturbation_control_value: Dimethyl Sulfoxide
covariate_keys: [cell_type]
batch_size: 4000
num_workers: 8
batch_sample: True
add_controls: True
use_counts: False
embedding_key: null
# Restrict dataset to compounds that have an LPM embedding so that
# onehot/ECFP/LPM runs all train and evaluate on the same compound pool.
perturbation_subset_path: ${paths.data_dir}/op3_lpm_available_compounds.txt
evaluation:
  chunk_size: 50
