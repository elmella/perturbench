_target_: lightning.pytorch.trainer.Trainer

default_root_dir: ${paths.output_dir}

min_epochs: 1 # prevents early stopping
max_epochs: 10

accelerator: gpu
devices: 1

# mixed precision for extra speed-up
precision: 16

# perform a validation loop every N training epochs
check_val_every_n_epoch: 1

# set True to to ensure deterministic results
# makes training slower but gives more reproducibility than just setting seeds
deterministic: False

# log every N steps
log_every_n_steps: 10

# cudnn autotuner — picks fastest algo for the observed input shapes. Safe
# because deterministic=False and shapes are fixed per model.
benchmark: True

# Skip Lightning's pre-train sanity validation steps. They don't update weights
# so downstream metrics are unaffected; saves a few seconds per run.
num_sanity_val_steps: 0